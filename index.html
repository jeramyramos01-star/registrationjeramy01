

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>College Enrollment Form</title>
  <style>
    body {
      padding: 25px;
      background-color: #e6f0ff;
      font-family: Arial, sans-serif;
      color: #1a365d;
    }
    h1 {
      color: #2a4d8f;
      text-align: center;
      margin-bottom: 30px;
    }
    label {
      display: inline-block;
      width: 140px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    input[type="text"],
    input[type="date"],
    input[type="time"],
    input[type="number"],
    select {
      width: 250px;
      padding: 6px 8px;
      margin-bottom: 15px;
      border: 1px solid #4d79ff;
      border-radius: 4px;
      background-color: white;
      color: #1a365d;
      font-size: 14px;
    }
    input[type="radio"] {
      margin-left: 5px;
      margin-right: 4px;
    }
    .radio-label {
      margin-right: 15px;
    }
    .btn-link {
      display: inline-block;
      text-align: center;
      text-decoration: none;
      background-color: #2a4d8f;
      color: white;
      width: 200px;
      height: 35px;
      line-height: 35px;
      border-radius: 5px;
      font-weight: 700;
      margin-right: 10px;
      cursor: pointer;
    }
    .btn-link:hover {
      background-color: #1a365d;
    }
    input[type="reset"] {
      background-color: #ffffff;
      border: 2px solid #2a4d8f;
      color: #2a4d8f;
      width: 200px;
      height: 35px;
      font-weight: 700;
      border-radius: 5px;
      cursor: pointer;
    }
    input[type="reset"]:hover {
      background-color: #2a4d8f;
      color: white;
    }
    form {
      max-width: 480px;
      margin: 0 auto;
      background: white;
      padding: 25px 40px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(42, 77, 143, 0.3);
    }
  </style>
</head>
<body>
  <h1>College Enrollment Form</h1>
  <form>
    <label for="firstName">First Name:</label>
    <input type="text" id="firstName" placeholder="Please Enter First Name" required /><br />

    <label for="middleName">Middle Name:</label>
    <input type="text" id="middleName" placeholder="Please Enter Middle Name" required /><br />

    <label for="lastName">Last Name:</label>
    <input type="text" id="lastName" placeholder="Please Enter Last Name" required /><br />

    <label for="birthDate">Birth Date:</label>
    <input type="date" id="birthDate" /><br />

    <label for="birthTime">Birth Time:</label>
    <input type="time" id="birthTime" /><br />

    <label for="birthdayText">Birthday:</label>
    <input type="text" id="birthdayText" /><br />

    <label for="age">Age:</label>
    <input type="number" id="age" /><br />

    <label for="yearLevel">Year Level:</label>
    <select id="yearLevel" required>
      <option value="">Please Select Year Level</option>
      <option value="1st Year">1st Year</option>
      <option value="2nd Year">2nd Year</option>
      <option value="3rd Year">3rd Year</option>
      <option value="4th Year">4th Year</option>
    </select><br />

    <label for="course">Course:</label>
    <select id="course" required>
      <option value="">Please Select Course</option>
      <option value="ACT">ACT</option>
      <option value="BSOA">BSOA</option>
      <option value="HM">HM</option>
    </select><br />

    <label for="citizenship">Citizenship:</label>
    <input type="text" id="citizenship" /><br />

    <label>Sex:</label>
    <span class="radio-label"><input type="radio" name="gender" id="male" value="Male" /><label for="male">Male</label></span>
    <span class="radio-label"><input type="radio" name="gender" id="female" value="Female" /><label for="female">Female</label></span><br />

    <label for="civilStatus">Civil Status:</label>
    <input type="text" id="civilStatus" /><br />

    <label for="region">Region:</label>
    <input type="text" id="region" /><br />

    <label for="province">Province:</label>
    <input type="text" id="province" /><br />

    <label for="city">City:</label>
    <input type="text" id="city" /><br />

    <label for="barangay">Barangay:</label>
    <input type="text" id="barangay" /><br />

    <label for="houseNo">House No/Street:</label>
    <input type="text" id="houseNo" /><br />

    <label for="contactNo">Contact No:</label>
    <input type="number" id="contactNo" /><br />

    <label for="credentials">Credentials Submitted:</label>
    <select id="credentials" required>
      <option value="">Please Select Credentials</option>
      <option value="form138">form 138 (high school)</option>
      <option value="form137">form 137</option>
      <option value="birthCertificate">Birth Certificate</option>
      <option value="goodMoral">Good Moral Character</option>
      <option value="transcript">Transcript Of Records</option>
      <option value="certificate">Certificate Of Credentials</option>
      <option value="summerPermit">Summer Permit</option>
      <option value="picture">Picture</option>
    </select><br /><br />

    <a href="https://example.com/register" class="btn-link">Register</a>
    <input type="reset" value="Clear" />
  </form>
</body>
</html>
