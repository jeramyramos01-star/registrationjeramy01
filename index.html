
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clark College Enrollment Form</title>
  <style>

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f9fbfe;
      color: #084298;
      margin: 0;
      padding: 40px 15px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    main {
      background-color: #fff;
      max-width: 570px;
      width: 100%;
      border: 1.5px solid #084298;
      border-radius: 10px;
      box-shadow: 0 4px 12px rgba(8, 66, 152, 0.1);
      padding: 30px 40px;
    }

    h1 {
      text-align: center;
      color: #084298;
      font-weight: 700;
      font-size: 2rem;
      margin-bottom: 25px;
      letter-spacing: 1.2px;
    }

    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 28px;
    }

    fieldset {
      border: 1px solid #084298;
      border-radius: 8px;
      padding: 1em 1.2em;
      margin-bottom: 1.5em;
      grid-column: 1 / -1;
    }

    legend {
      font-weight: 700;
      color: #084298;
      padding: 0 8px;
      font-size: 1.05rem;
    }

    label {
      color: #084298;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 6px;
      display: block;
      user-select: none;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    input[type="time"],
    input[type="tel"],
    select {
      width: 100%;
      padding: 9px 12px;
      font-size: 1rem;
      border: 1.8px solid #084298;
      border-radius: 5px;
      background-color: #ffffff;
      color: #084298;
      transition: border-color 0.25s ease, background-color 0.25s ease;
      outline-offset: 2px;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus,
    input[type="time"]:focus,
    input[type="tel"]:focus,
    select:focus {
      border-color: #0a5cd8;
      background-color: #e8f0fe;
      outline: none;
    }

    .gender-group {
      display: flex;
      gap: 30px;
      align-items: center;
      margin-top: 8px;
    }

    .gender-group label {
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      color: #084298;
    }

    .gender-group input[type="radio"] {
      margin-right: 6px;
      accent-color: #0a5cd8;
      cursor: pointer;
    }

    .buttons {
      grid-column: 1 / -1;
      display: flex;
      gap: 22px;
      justify-content: center;
      margin-top: 25px;
    }

    button,
    a.button-link {
      flex: 1;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 12px 0;
      border-radius: 7px;
      border: none;
      color: #fff;
      user-select: none;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(8, 66, 152, 0.4);
      transition: background-color 0.3s ease;
    }

    a.button-link {
      background-color: #0a5cd8;
    }

    a.button-link:hover {
      background-color: #083f8a;
    }

    button[type="submit"] {
      background-color: #28a745; /* green */
    }

    button[type="submit"]:hover {
      background-color: #218838; /* darker green */
    }

    button[type="reset"] {
      background-color: #d93025;
    }

    button[type="reset"]:hover {
      background-color: #a82a1d;
    }

    /* Responsive */
    @media (max-width: 620px) {
      form {
        grid-template-columns: 1fr;
        padding: 0;
      }

      .buttons {
        flex-direction: column;
      }

      button,
      a.button-link {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>Clark College Enrollment Form</h1>
    <form action="#" method="post" novalidate>
      <fieldset>
        <legend>Personal Information</legend>

        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName" placeholder="Enter First Name" required />

        <label for="middleName">Middle Name:</label>
        <input type="text" id="middleName" name="middleName" placeholder="Enter Middle Name" required />

        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" name="lastName" placeholder="Enter Last Name" required />

        <label for="birthDate">Birth Date:</label>
        <input type="date" id="birthDate" name="birthDate" required />

        <label for="birthTime">Birth Time (optional):</label>
        <input type="time" id="birthTime" name="birthTime" />

        <label for="gender">Sex:</label>
        <div class="gender-group" role="radiogroup" aria-labelledby="genderLabel">
          <label><input type="radio" name="gender" value="Male" required /> Male</label>
          <label><input type="radio" name="gender" value="Female" /> Female</label>
        </div>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="0" max="120" placeholder="Enter Age" />
      </fieldset>

      <fieldset>
        <legend>Enrollment Details</legend>

        <label for="yearLevel">Year Level:</label>
        <select id="yearLevel" name="yearLevel" required>
          <option value="" disabled selected>Select Year Level</option>
          <option value="1st Year">1st Year</option>
          <option value="2nd Year">2nd Year</option>
          <option value="3rd Year">3rd Year</option>
          <option value="4th Year">4th Year</option>
        </select>

        <label for="course">Course:</label>
        <select id="course" name="course" required>
          <option value="" disabled selected>Select Course</option>
          <option value="ACT">ACT</option>
          <option value="BSOA">BSOA</option>
          <option value="HM">HM</option>
        </select>

        <label for="citizenship">Citizenship:</label>
        <input type="text" id="citizenship" name="citizenship" placeholder="Enter Citizenship" />

        <label for="civilStatus">Civil Status:</label>
        <input type="text" id="civilStatus" name="civilStatus" placeholder="Enter Civil Status" />
      </fieldset>

      <fieldset>
        <legend>Address</legend>

        <label for="region">Region:</label>
        <input type="text" id="region" name="region" placeholder="Enter Region" />

        <label for="province">Province:</label>
        <input type="text" id="province" name="province" placeholder="Enter Province" />

        <label for="city">City:</label>
        <input type="text" id="city" name="city" placeholder="Enter City" />

        <label for="barangay">Barangay:</label>
        <input type="text" id="barangay" name="barangay" placeholder="Enter Barangay" />

        <label for="houseNo">House No/Street:</label>
        <input type="text" id="houseNo" name="houseNo" placeholder="Enter House No/Street" />
      </fieldset>

      <fieldset>
        <legend>Contact & Credentials</legend>

        <label for="contactNo">Contact Number:</label>
        <input type="tel" id="contactNo" name="contactNo" placeholder="Enter Contact Number" pattern="[0-9]{7,15}" maxlength="15" />

        <label for="credentials">Credentials Submitted:</label>
        <select id="credentials" name="credentials" required>
          <option value="" disabled selected>Select Credentials</option>
          <option value="form138">Form 138 (High School)</option>
          <option value="form137">Form 137</option>
          <option value="birthCertificate">Birth Certificate</option>
          <option value="goodMoral">Good Moral Character</option>
          <option value="transcript">Transcript of Records</option>
          <option value="certificate">Certificate of Credentials</option>
          <option value="summerPermit">Summer Permit</option>
          <option value="picture">Picture</option>
        </select>
      </fieldset>

      <div class="buttons full-width">
        <button type="submit" aria-label="Submit Enrollment Form">Submit</button>
        <button type="reset" aria-label="Clear the form">Clear</button>
      </div>
    </form>
  </main>
</body>

</html>
