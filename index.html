<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>

</nav>

<section class="hero">

        <a href="products.html">
            <button>Shop Now</button>
            
        </a>
    </div>
</section>

<div class="container">
    <h2>Featured Product's</h2>

    <div class="products">

<div class="product">
            <img src="main/grs.jpg" alt="">
            <h3>Urban Grey Shirt</h3>
            <p>$28</p>

        </div>

        <div class="product">
            <img src="main/cream.webp" alt="">
            <h3>Signature Logo Tee</h3>

         <button onclick="addToCart(35)">Add to Cart</button>
        </div>

        <div class="product">

<footer>

</footer>

</body>
<style>
 body {
    background: #f1f1f1;
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
}

nav {
    background: #002366; 
    padding: 15px 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
}

nav a {
    color: white;
    font-weight: bold;
    text-decoration: none;
    margin-left: 20px;
}

nav a:hover {
    color: #E4002B; 
}

.hero {
    height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: linear-gradient(to right, #002366, #E4002B);
    color: white;
}

.hero button {
    background: white;
    color: #002366;
    padding: 12px 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    border-radius: 5px;
    transition: background 0.3s ease;
}

.hero button:hover {
    background: #E4002B;
    color: white;
}

.product {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 20px rgba(0, 35, 102, 0.15);
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.product p {
    color: #E4002B; /* Red price */
    font-weight: 700;
    font-size: 1.1rem;
}

.product button {
    background: #002366; 
    color: white;
    padding: 10px 25px;
    border-radius: 35px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0, 35, 102, 0.3);
    border: none;
    transition: background 0.3s ease;
}

.product button:hover {
    background: #E4002B; 
    box-shadow: 0 6px 14px rgba(228, 0, 43, 0.5);
}

footer {
    text-align: center;
    padding: 20px;
    background: #002366;
    color: white;
}
       


.container{
    padding: 40px 60px;
    max-width: 1100px;
    margin: 0 auto;
}

h2 {
    font-size: 2.5rem;
    color: #111;
    text-align: center;
    margin-bottom: 40px;
    font-weight: 700;
    letter-spacing: 1.5px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
}

.product {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.product:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 30px rgba(0,0,0,0.15);
}

.product img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 15px;
    transition: transform 0.3s ease;
}

.product:hover img {
    transform: scale(1.05);
}

.product h3 {
    font-size: 1.3rem;
    font-weight: 600;
    color: #222;
    margin-bottom: 8px;
}

.product p {
    font-weight: 700;
    color: #e60023; /* Brand red */
    margin-bottom: 15px;
    font-size: 1.1rem;
}

.product button {
    padding: 10px 25px;
    border: none;
    background: #e60023;
    color: white;
    border-radius: 35px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s ease;
    box-shadow: 0 4px 10px rgba(230, 0, 35, 0.3);
}

.product button:hover {
    background: #b0001a;
    box-shadow: 0 6px 14px rgba(176, 0, 26, 0.5);
}

    </style>
</head>



</html>
